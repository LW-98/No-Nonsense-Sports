name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}

      - name: Build
        run: xcodebuild -project "No Nonsense Sports.xcodeproj" -scheme "No Nonsense Sports" -destination "platform=iOS Simulator,name=iPhone 16" build

      - name: Test
        run: xcodebuild test -project "No Nonsense Sports.xcodeproj" -scheme "No Nonsense Sports" -destination "platform=iOS Simulator,name=iPhone 16"
