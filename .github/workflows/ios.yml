name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SCHEME: "No Nonsense Sports"
      PROJECT: "No Nonsense Sports.xcodeproj"
      SIM_NAME: "iPhone 16"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}

      - name: Pick simulator runtime
        id: sim
        run: |
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "import json,sys;rs=[r for r in json.load(sys.stdin)['runtimes'] if r['isAvailable'] and r['identifier'].startswith('com.apple.CoreSimulator.SimRuntime.iOS')];rs.sort(key=lambda r:r['version']);print(rs[-1]['identifier'])")
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"
          echo "Using runtime: $RUNTIME"

      - name: Boot simulator
        run: |
          set -e
          UDID=$(xcrun simctl create "CI-${SIM_NAME}" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "${{ steps.sim.outputs.runtime }}")
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            -resultBundlePath TestResults.xcresult \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            test

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
